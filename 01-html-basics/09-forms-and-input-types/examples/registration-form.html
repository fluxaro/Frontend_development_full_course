<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Registration Form</title>
</head>
<body>

  <header>
    <h1>Create Your Account</h1>
    <p>Fill in the form below to register. All fields marked with * are required.</p>
  </header>

  <main>
    <form action="/register" method="POST">

      <fieldset>
        <legend>Personal Information</legend>

        <div>
          <label for="first-name">First Name *</label>
          <input
            type="text"
            id="first-name"
            name="first_name"
            placeholder="Enter your first name"
            required
            autocomplete="given-name"
          >
        </div>

        <div>
          <label for="last-name">Last Name *</label>
          <input
            type="text"
            id="last-name"
            name="last_name"
            placeholder="Enter your last name"
            required
            autocomplete="family-name"
          >
        </div>

        <div>
          <label for="email">Email Address *</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            required
            autocomplete="email"
          >
        </div>

        <div>
          <label for="phone">Phone Number</label>
          <input
            type="tel"
            id="phone"
            name="phone"
            placeholder="+1 (555) 000-0000"
            autocomplete="tel"
          >
        </div>

        <div>
          <label for="dob">Date of Birth *</label>
          <input
            type="date"
            id="dob"
            name="date_of_birth"
            required
          >
        </div>

        <div>
          <label for="age">Age</label>
          <input
            type="number"
            id="age"
            name="age"
            min="13"
            max="120"
            placeholder="Your age"
          >
        </div>
      </fieldset>

      <fieldset>
        <legend>Account Security</legend>

        <div>
          <label for="username">Username *</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Choose a username"
            required
            minlength="3"
            maxlength="20"
            autocomplete="username"
          >
        </div>

        <div>
          <label for="password">Password *</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Create a strong password"
            required
            minlength="8"
            autocomplete="new-password"
          >
        </div>

        <div>
          <label for="confirm-password">Confirm Password *</label>
          <input
            type="password"
            id="confirm-password"
            name="confirm_password"
            placeholder="Repeat your password"
            required
            autocomplete="new-password"
          >
        </div>
      </fieldset>

      <fieldset>
        <legend>Profile</legend>

        <div>
          <label for="gender">Gender</label>
          <select id="gender" name="gender">
            <option value="">-- Select --</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="non-binary">Non-binary</option>
            <option value="prefer-not-to-say">Prefer not to say</option>
          </select>
        </div>

        <div>
          <label for="country">Country *</label>
          <select id="country" name="country" required>
            <option value="">-- Select your country --</option>
            <option value="us">United States</option>
            <option value="uk">United Kingdom</option>
            <option value="ca">Canada</option>
            <option value="au">Australia</option>
            <option value="ng">Nigeria</option>
            <option value="gh">Ghana</option>
            <option value="za">South Africa</option>
            <option value="in">India</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div>
          <label for="avatar">Profile Picture</label>
          <input
            type="file"
            id="avatar"
            name="avatar"
            accept="image/jpeg,image/png,image/webp"
          >
        </div>

        <div>
          <label for="website">Website</label>
          <input
            type="url"
            id="website"
            name="website"
            placeholder="https://yourwebsite.com"
          >
        </div>

        <div>
          <label for="bio">Bio</label>
          <textarea
            id="bio"
            name="bio"
            rows="4"
            cols="50"
            placeholder="Tell us a little about yourself..."
            maxlength="500"
          ></textarea>
        </div>
      </fieldset>

      <fieldset>
        <legend>Interests</legend>
        <p>Select all that apply:</p>

        <div>
          <input type="checkbox" id="interest-frontend" name="interests" value="frontend">
          <label for="interest-frontend">Frontend Development</label>
        </div>
        <div>
          <input type="checkbox" id="interest-backend" name="interests" value="backend">
          <label for="interest-backend">Backend Development</label>
        </div>
        <div>
          <input type="checkbox" id="interest-design" name="interests" value="design">
          <label for="interest-design">UI/UX Design</label>
        </div>
        <div>
          <input type="checkbox" id="interest-mobile" name="interests" value="mobile">
          <label for="interest-mobile">Mobile Development</label>
        </div>
        <div>
          <input type="checkbox" id="interest-data" name="interests" value="data">
          <label for="interest-data">Data Science</label>
        </div>
      </fieldset>

      <fieldset>
        <legend>Experience Level</legend>

        <div>
          <input type="radio" id="level-beginner" name="experience" value="beginner" checked>
          <label for="level-beginner">Beginner (0–1 years)</label>
        </div>
        <div>
          <input type="radio" id="level-intermediate" name="experience" value="intermediate">
          <label for="level-intermediate">Intermediate (1–3 years)</label>
        </div>
        <div>
          <input type="radio" id="level-advanced" name="experience" value="advanced">
          <label for="level-advanced">Advanced (3+ years)</label>
        </div>
      </fieldset>

      <fieldset>
        <legend>Preferences</legend>

        <div>
          <label for="theme">Preferred Theme</label>
          <input type="color" id="theme" name="theme_color" value="#3b82f6">
        </div>

        <div>
          <label for="notifications">Notification Frequency</label>
          <input
            type="range"
            id="notifications"
            name="notification_frequency"
            min="0"
            max="10"
            value="5"
          >
          <output>5</output>
        </div>
      </fieldset>

      <fieldset>
        <legend>Terms and Conditions</legend>

        <div>
          <input type="checkbox" id="terms" name="terms" required>
          <label for="terms">I agree to the <a href="/terms">Terms of Service</a> and <a href="/privacy">Privacy Policy</a> *</label>
        </div>

        <div>
          <input type="checkbox" id="newsletter" name="newsletter">
          <label for="newsletter">Subscribe to our newsletter (optional)</label>
        </div>
      </fieldset>

      <div>
        <button type="submit">Create Account</button>
        <button type="reset">Clear Form</button>
      </div>

    </form>
  </main>

</body>
</html>
