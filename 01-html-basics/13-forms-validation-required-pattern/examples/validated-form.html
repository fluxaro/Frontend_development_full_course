<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML5 Form Validation Demo</title>
  <style>
    input:valid, select:valid, textarea:valid {
      border: 2px solid green;
    }
    input:invalid:not(:placeholder-shown),
    select:invalid:not(:placeholder-shown),
    textarea:invalid:not(:placeholder-shown) {
      border: 2px solid red;
    }
    input:required {
      border-left: 4px solid orange;
    }
  </style>
</head>
<body>

  <header>
    <h1>HTML5 Form Validation Demo</h1>
    <p>This form demonstrates all HTML5 validation attributes. Try submitting with invalid data.</p>
  </header>

  <main>
    <form action="/signup" method="POST">

      <fieldset>
        <legend>Account Details</legend>

        <div>
          <label for="username">Username *</label>
          <input
            type="text"
            id="username"
            name="username"
            required
            minlength="3"
            maxlength="20"
            pattern="[A-Za-z0-9_]+"
            title="3–20 characters. Letters, numbers, and underscores only."
            placeholder="e.g. john_doe"
          >
          <small>3–20 characters. Letters, numbers, underscores only.</small>
        </div>

        <div>
          <label for="email">Email Address *</label>
          <input
            type="email"
            id="email"
            name="email"
            required
            placeholder="you@example.com"
          >
        </div>

        <div>
          <label for="password">Password *</label>
          <input
            type="password"
            id="password"
            name="password"
            required
            minlength="8"
            pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}"
            title="At least 8 characters, one uppercase letter, and one number."
          >
          <small>Min 8 characters, one uppercase, one number.</small>
        </div>
      </fieldset>

      <fieldset>
        <legend>Personal Details</legend>

        <div>
          <label for="age">Age *</label>
          <input
            type="number"
            id="age"
            name="age"
            required
            min="18"
            max="120"
            title="You must be at least 18 years old."
          >
        </div>

        <div>
          <label for="dob">Date of Birth *</label>
          <input
            type="date"
            id="dob"
            name="date_of_birth"
            required
            max="2007-01-01"
            title="You must be at least 18 years old."
          >
        </div>

        <div>
          <label for="phone">Phone Number</label>
          <input
            type="tel"
            id="phone"
            name="phone"
            pattern="\+?[\d\s\-\(\)]{7,15}"
            title="Enter a valid phone number (7–15 digits)."
            placeholder="+1 555 000 0000"
          >
          <small>Optional. Include country code.</small>
        </div>

        <div>
          <label for="website">Website</label>
          <input
            type="url"
            id="website"
            name="website"
            placeholder="https://yourwebsite.com"
            title="Enter a valid URL starting with https://"
          >
        </div>
      </fieldset>

      <fieldset>
        <legend>Terms</legend>

        <div>
          <input type="checkbox" id="terms" name="terms" required>
          <label for="terms">I agree to the Terms of Service *</label>
        </div>
      </fieldset>

      <div>
        <button type="submit">Create Account</button>
        <button type="reset">Clear Form</button>
      </div>

    </form>
  </main>

</body>
</html>
